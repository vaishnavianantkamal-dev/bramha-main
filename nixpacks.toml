[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs-18_x"]
aptPkgs = ["libicu-dev", "libpng-dev", "libzip-dev", "zip", "unzip"]

[phases.install]
dependsOn = ["setup"]
cmds = [
    "composer install --no-dev --ignore-platform-reqs --no-scripts",
    "npm install"
]

[phases.build]
dependsOn = ["install"]
cmds = [
    "npm run build"
]

[start]
cmd = "php spark serve --host=0.0.0.0 --port=$PORT"
